name: 🐛 Bug Report
description: Something broken on the site?
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the issue
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: https://theclawdex.com/
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
