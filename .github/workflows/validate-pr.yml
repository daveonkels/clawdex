name: Validate PR

on:
  pull_request:
    paths:
      - 'src/data/projects/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/validate-projects.mjs
      - run: npm run build
