tagline: "A complete AI agent runtime in 6MB"
description: "Ultra-lightweight personal AI assistant that combines the best of OpenClaw's integrations, NanoClaw's security, and PicoClaw's minimalism — without their tradeoffs. Ships as a single Rust binary with 32 built-in tools, MCP support, multi-channel messaging (Telegram, Slack, Discord, WhatsApp, Email, MQTT), container isolation, and IoT-ready architecture."
