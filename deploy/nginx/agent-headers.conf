# Agent-friendly nginx snippet for shelldex.com.
#
# Paste into the ploi.io site's nginx config (Site → Manage → Nginx
# Configuration) inside the `server { ... }` block. Or drop this file
# on the server and `include /path/to/agent-headers.conf;` from the
# server block.
#
# Requires no http{}-level directives, so it works inside any ploi site
# block.

# ── RFC 8288 Link headers: advertise agent resources on every response ──
# `always` means the header is emitted even on error responses (404, 500).
add_header Link '</.well-known/api-catalog>; rel="api-catalog"' always;
add_header Link '</openapi.json>; rel="service-desc"; type="application/vnd.oai.openapi+json;version=3.1"' always;
add_header Link '</AGENTS.md>; rel="service-doc"; type="text/markdown"' always;
add_header Link '</llms.txt>; rel="describedby"; type="text/plain"' always;
add_header Link '</.well-known/mcp/server-card.json>; rel="mcp-server-card"; type="application/json"' always;
add_header Link '</.well-known/agent-skills/index.json>; rel="agent-skills"; type="application/json"' always;

# CORS on agent-facing JSON/markdown so browser-based agents can fetch.
add_header Access-Control-Allow-Origin "*" always;
add_header Vary "Accept" always;

# ── Correct content types for agent-facing files ──
location = /AGENTS.md                          { default_type "text/markdown; charset=utf-8"; }
location = /llms.txt                           { default_type "text/plain; charset=utf-8"; }
location = /llms-full.txt                      { default_type "text/plain; charset=utf-8"; }
location = /openapi.json                       { default_type "application/vnd.oai.openapi+json;version=3.1"; }
location = /.well-known/api-catalog            { default_type "application/linkset+json"; }
location = /.well-known/oauth-protected-resource { default_type "application/json"; }
location ^~ /api/                              { default_type "application/json; charset=utf-8"; }
location ^~ /md/                               { default_type "text/markdown; charset=utf-8"; }

# ── Markdown for Agents (Accept: text/markdown content negotiation) ──
# When an agent sends `Accept: text/markdown`, internally rewrite the
# response to the /md/ mirror. Browsers never send text/markdown, so the
# default HTML response is unaffected. The URL in the address bar stays
# the same (internal rewrite, not redirect).

# Homepage → /md/index.md
location = / {
    set $serve_md 0;
    if ($http_accept ~* text/markdown) { set $serve_md 1; }
    if ($serve_md = 1) { rewrite ^ /md/index.md last; }
    try_files /index.html =404;
}

# /leaderboard/ → /md/leaderboard.md
location ~ ^/leaderboard/?$ {
    set $serve_md 0;
    if ($http_accept ~* text/markdown) { set $serve_md 1; }
    if ($serve_md = 1) { rewrite ^ /md/leaderboard.md last; }
    try_files /leaderboard/index.html =404;
}

# /projects/{slug}/ → /md/projects/{slug}.md
location ~ ^/projects/([a-z0-9-]+)/?$ {
    set $serve_md 0;
    if ($http_accept ~* text/markdown) { set $serve_md 1; }
    if ($serve_md = 1) { rewrite ^ /md/projects/$1.md last; }
    try_files /projects/$1/index.html =404;
}

# /compare/{pair}/ → /md/compare/{pair}.md
location ~ ^/compare/([a-z0-9-]+)/?$ {
    set $serve_md 0;
    if ($http_accept ~* text/markdown) { set $serve_md 1; }
    if ($serve_md = 1) { rewrite ^ /md/compare/$1.md last; }
    try_files /compare/$1/index.html =404;
}
